name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Listar arquivos
      run: |
        pwd
        ls -la
        find . -name configure

    - name: configure
      run: chmod +x ./configure && ./configure

    - name: make
      run: make
